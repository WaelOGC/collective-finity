<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</helmet>
<dc-import name="Shell" active-screen="favorites" content="{{ pageContent }}" hint-size="100%,100%"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = { loaded: false, width: typeof window !== 'undefined' ? window.innerWidth : 1440, auth: 'out' };
  }
  async componentDidMount() {
    const [dataMod, tokMod] = await Promise.all([import('./shared-data.js'), import('./shared-tokens.js')]);
    this._mod = dataMod;
    this._tok = tokMod;
    this.setState({ loaded: true, auth: tokMod.loadSharedState().auth || 'out' });
    this._onResize = () => this.setState({ width: window.innerWidth });
    window.addEventListener('resize', this._onResize);
  }
  componentWillUnmount() { if (this._onResize) window.removeEventListener('resize', this._onResize); }

  renderVals() {
    if (!this.state.loaded) return { pageContent: null };
    const isMobile = this.state.width < 768;
    const { buildAlbums, buildLibraryTracks } = this._mod;
    const albums = buildAlbums();
    const libraryTracks = buildLibraryTracks(albums);

    let pageContent;
    if (this.state.auth === 'in') {
      const trackRowStyle = { display: 'grid', gridTemplateColumns: isMobile ? '28px 1fr 50px' : '28px 1fr 1fr 70px', alignItems: 'center', gap: '14px', padding: '11px 10px', borderRadius: '9px', width: '100%', textAlign: 'left', color: '#B3B3B3' };
      const albumCard = (a) => React.createElement('div', { key: a.id },
        React.createElement('div', { style: { width: '100%', aspectRatio: '1', borderRadius: '12px', background: a.gradient, marginBottom: '10px' } }),
        React.createElement('div', { style: { fontSize: '14px', fontWeight: 600, color: '#fff' } }, a.title),
        React.createElement('div', { style: { fontSize: '12px', color: '#7A7A7A', marginTop: '2px' } }, a.artist));
      pageContent = React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: '32px' } },
        React.createElement('div', {},
          React.createElement('div', { style: { fontSize: isMobile ? '19px' : '22px', fontWeight: 700, color: '#fff', marginBottom: '16px' } }, 'Liked Tracks'),
          React.createElement('div', {}, libraryTracks.slice(0, 5).map((t, i) => React.createElement('div', { key: t.id, style: trackRowStyle },
            React.createElement('span', { style: { color: '#FFB700' } }, '\u2665'),
            React.createElement('span', {},
              React.createElement('div', { style: { fontSize: '13.5px', fontWeight: 600, color: '#fff' } }, t.title),
              React.createElement('div', { style: { fontSize: '12px', color: '#7A7A7A' } }, t.artist)),
            !isMobile ? React.createElement('span', { style: { fontSize: '13px', color: '#7A7A7A' } }, t.album) : null,
            React.createElement('span', { style: { fontSize: '12px', color: '#7A7A7A', fontFamily: "'Space Mono',monospace", textAlign: 'right' } }, t.duration))))),
        React.createElement('div', {},
          React.createElement('div', { style: { fontSize: isMobile ? '19px' : '22px', fontWeight: 700, color: '#fff', marginBottom: '16px' } }, 'Liked Albums'),
          React.createElement('div', { style: { display: 'grid', gridTemplateColumns: `repeat(auto-fill, minmax(${isMobile ? '130px' : '164px'}, 1fr))`, gap: '18px' } }, albums.slice(0, 3).map((a) => albumCard(a)))));
    } else {
      pageContent = React.createElement('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', gap: '14px', padding: '60px 20px', maxWidth: '380px', margin: '0 auto' } },
        React.createElement('div', { style: { fontSize: '19px', fontWeight: 700, color: '#fff' } }, 'Sign in to see your Favorites'),
        React.createElement('div', { style: { fontSize: '13.5px', color: '#7A7A7A', lineHeight: 1.5 } }, 'Sign in to your Collective Finity account to keep this personalized.'),
        React.createElement('a', { href: 'Login.dc.html', style: { padding: '11px 22px', borderRadius: '9px', border: 'none', background: '#FFB700', color: '#0D0D0D', fontWeight: 700, fontSize: '13.5px', textDecoration: 'none', marginTop: '4px' }, 'style-hover': { background: '#ffc633' } }, 'Log In'));
    }

    return { pageContent };
  }
}

</script>
</body>
</html>
