<!DOCTYPE html>
<html>

</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</helmet>
<dc-import name="Shell" active-screen="community" content="{{ pageContent }}" hint-size="100%,100%"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>

      React.createElement('div', { style: { position: 'absolute', inset: 0, ...dotBg, opacity: 0.4, pointerEvents: 'none' } }),

        React.createElement('span', { style: { fontFamily: "'Space Mono',monospace", fontSize: '11px', letterSpacing: '0.1em', color: '#FFB700' } }, 'THE COLLECTIVE'),
        React.createElement('div', { style: { fontSize: isMobile ? '24px' : '32px', fontWeight: 700, color: '#fff', lineHeight: 1.2 } }, 'Find Your Sound Family'),

          React.createElement('div', { style: { width: '42px', height: '42px', minWidth: '42px', borderRadius: '10px', background: 'rgba(255,183,0,0.12)', color: '#FFB700', display: 'flex', alignItems: 'center', justifyContent: 'center' } }, icon(c.icon, 20)),

</script>
</body>
</html>
