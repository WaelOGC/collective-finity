<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</helmet>
<dc-import name="Shell" active-screen="playlists" content="{{ pageContent }}" hint-size="100%,100%"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = { loaded: false, width: typeof window !== 'undefined' ? window.innerWidth : 1440, auth: 'out' };
  }
  async componentDidMount() {
    const [uiMod, tokMod] = await Promise.all([import('./shared-ui.js'), import('./shared-tokens.js')]);
    this._ui = uiMod;
    this._tok = tokMod;
    this.setState({ loaded: true, auth: tokMod.loadSharedState().auth || 'out' });
    this._onResize = () => this.setState({ width: window.innerWidth });
    window.addEventListener('resize', this._onResize);
  }
  componentWillUnmount() { if (this._onResize) window.removeEventListener('resize', this._onResize); }

  renderVals() {
    if (!this.state.loaded) return { pageContent: null };
    const icon = (name, size) => this._ui.buildIcon(React, name, size);
    const isMobile = this.state.width < 768;

    let pageContent;
    if (this.state.auth === 'in') {
      pageContent = React.createElement('div', {},
        React.createElement('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '20px', flexWrap: 'wrap', gap: '12px' } },
          React.createElement('div', { style: { fontSize: isMobile ? '19px' : '22px', fontWeight: 700, color: '#fff' } }, 'Personal Playlists'),
          React.createElement('button', { style: { padding: '10px 16px', borderRadius: '9px', border: 'none', background: '#FFB700', color: '#0D0D0D', fontWeight: 700, fontSize: '13px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '8px' }, 'style-hover': { background: '#ffc633' } }, icon('plus', 15), 'Create Playlist')),
        React.createElement('div', { style: { display: 'grid', gridTemplateColumns: `repeat(auto-fill, minmax(${isMobile ? '130px' : '170px'}, 1fr))`, gap: '20px' } },
          [{ n: 'Late Shift Loops', c: 18 }, { n: 'Static & Amber', c: 9 }, { n: 'Slow Signal', c: 24 }].map((p) => React.createElement('div', { key: p.n },
            React.createElement('div', { style: { width: '100%', aspectRatio: '1', borderRadius: '12px', background: '#161616', border: '1px solid #232323', marginBottom: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#333' } }, icon('playlist', 26)),
            React.createElement('div', { style: { fontSize: '14px', fontWeight: 600, color: '#fff' } }, p.n),
            React.createElement('div', { style: { fontSize: '12px', color: '#7A7A7A' } }, p.c + ' tracks')))));
    } else {
      pageContent = React.createElement('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', gap: '14px', padding: '60px 20px', maxWidth: '380px', margin: '0 auto' } },
        React.createElement('div', { style: { fontSize: '19px', fontWeight: 700, color: '#fff' } }, 'Sign in to see your Playlists'),
        React.createElement('div', { style: { fontSize: '13.5px', color: '#7A7A7A', lineHeight: 1.5 } }, 'Sign in to your Collective Finity account to keep this personalized.'),
        React.createElement('a', { href: 'Login.dc.html', style: { padding: '11px 22px', borderRadius: '9px', border: 'none', background: '#FFB700', color: '#0D0D0D', fontWeight: 700, fontSize: '13.5px', textDecoration: 'none', marginTop: '4px' }, 'style-hover': { background: '#ffc633' } }, 'Log In'));
    }

    return { pageContent };
  }
}

</script>
</body>
</html>
