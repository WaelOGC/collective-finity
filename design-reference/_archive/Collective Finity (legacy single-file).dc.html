<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #050505; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #262626; border-radius: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    @keyframes cfFadeDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes cfDrawerIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    @keyframes cfOverlayIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</helmet>

<div style="background:#050505; min-height:100vh; width:100%; display:flex; flex-direction:column; align-items:center; padding:24px 16px 64px; font-family:'Inter',-apple-system,sans-serif; color:#FFFFFF;">

  <!-- ============ PREVIEW CONTROL BAR ============ -->
  <div style="width:100%; max-width:1440px; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:14px; background:#0B0B0B; border:1px solid #1E1E1E; border-radius:12px; padding:14px 18px; margin-bottom:22px;">
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="width:10px; height:10px; border-radius:3px; background:#FFB700; transform:rotate(45deg);"></div>
      <span style="font-family:'Space Mono',monospace; font-size:12px; letter-spacing:0.08em; color:#7A7A7A;">COLLECTIVE FINITY — PROTOTYPE CONTROLS</span>
    </div>
    <div style="display:flex; flex-wrap:wrap; align-items:center; gap:18px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="font-family:'Space Mono',monospace; font-size:11px; color:#7A7A7A;">BREAKPOINT</span>
        <div style="display:flex; background:#141414; border:1px solid #232323; border-radius:8px; padding:3px; gap:2px;">
          <sc-for list="{{ bpOptions }}" as="bp" hint-placeholder-count="4">
            <button onClick="{{ bp.onClick }}" style="{{ bp.style }}" style-hover="{{ bp.styleHover }}">{{ bp.label }}</button>
          </sc-for>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="font-family:'Space Mono',monospace; font-size:11px; color:#7A7A7A;">AUTH</span>
        <button onClick="{{ toggleAuth }}" style="{{ authToggleStyle }}" style-hover="{{ authToggleHoverStyle }}">{{ authToggleLabel }}</button>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="font-family:'Space Mono',monospace; font-size:11px; color:#7A7A7A;">JUMP</span>
        <div style="display:flex; gap:6px;">
          <sc-for list="{{ jumpOptions }}" as="j" hint-placeholder-count="12">
            <button onClick="{{ j.onClick }}" style="{{ j.style }}" style-hover="{{ j.styleHover }}">{{ j.label }}</button>
          </sc-for>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ DEVICE FRAME ============ -->
  <div style="display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; max-width:1440px;">
    <span style="font-family:'Space Mono',monospace; font-size:11px; color:#7A7A7A; letter-spacing:0.06em;">{{ frameBadge }}</span>
    <div ref="{{ frameRef }}" style="{{ frameOuterStyle }}">
      <div style="{{ frameChromeStyle }}">

        <!-- ============ DESKTOP LAYOUT ============ -->
        <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
          <div style="{{ leftSidebarStyle }}">
            <div style="display:flex; align-items:center; gap:10px; padding:4px 8px 18px; {{ sidebarCollapsed_borderStyle }}">
              <div style="width:14px; height:14px; min-width:14px; border-radius:3px; background:#FFB700; transform:rotate(45deg);"></div>
              <sc-if value="{{ showSidebarLabels }}" hint-placeholder-val="{{ true }}">
                <span style="font-family:'Space Mono',monospace; font-size:13px; letter-spacing:0.06em; color:#FFFFFF; white-space:nowrap; overflow:hidden;">COLLECTIVE FINITY</span>
              </sc-if>
            </div>
            <div style="display:flex; flex-direction:column; gap:3px;">
              <sc-for list="{{ mainNav }}" as="item" hint-placeholder-count="5">
                <button onClick="{{ item.onClick }}" style="{{ item.rowStyle }}" style-hover="{{ item.rowHoverStyle }}" style-active="{{ item.rowActiveStyle }}">
                  {{ item.iconEl }}
                  <sc-if value="{{ showSidebarLabels }}" hint-placeholder-val="{{ true }}">
                    <span style="white-space:nowrap; overflow:hidden;">{{ item.label }}</span>
                  </sc-if>
                </button>
              </sc-for>
            </div>
            <div style="height:1px; background:#1E1E1E; margin:12px 4px;"></div>
            <div style="display:flex; flex-direction:column; gap:3px;">
              <sc-for list="{{ secondaryNav }}" as="item" hint-placeholder-count="2">
                <button onClick="{{ item.onClick }}" style="{{ item.rowStyle }}" style-hover="{{ item.rowHoverStyle }}" style-active="{{ item.rowActiveStyle }}">
                  {{ item.iconEl }}
                  <sc-if value="{{ showSidebarLabels }}" hint-placeholder-val="{{ true }}">
                    <span style="white-space:nowrap; overflow:hidden;">{{ item.label }}</span>
                  </sc-if>
                </button>
              </sc-for>
            </div>
            <div style="flex:1;"></div>
            <button onClick="{{ toggleSidebarCollapsed }}" style="{{ collapseBtnStyle }}" style-hover="{{ collapseBtnHoverStyle }}">
              {{ collapseIconEl }}
              <sc-if value="{{ showSidebarLabels }}" hint-placeholder-val="{{ true }}">
                <span>Collapse</span>
              </sc-if>
            </button>
          </div>

          <div ref="{{ mainScrollRef }}" onScroll="{{ onMainScroll }}" style="flex:1; overflow-y:auto; background:#0D0D0D; padding:30px 34px; min-width:0;">
            {{ screenContent }}
            {{ siteFooter }}
          </div>

          <div style="{{ rightSidebarStyle }}">
            <div style="{{ rightIconsRowStyle }}">
              <button onClick="{{ toggleDropdown }}" style="{{ accountBtnStyle }}" style-hover="{{ iconBtnHoverStyle }}">{{ userIconEl }}</button>
              <button style="{{ iconBtnStyle }}" style-hover="{{ iconBtnHoverStyle }}">{{ mailIconEl }}</button>
              <button style="{{ iconBtnStyle }}" style-hover="{{ iconBtnHoverStyle }}">{{ bellIconEl }}</button>
            </div>
            <sc-if value="{{ dropdownOpen }}" hint-placeholder-val="{{ false }}">
              <div onClick="{{ closeDropdown }}" style="position:absolute; inset:0; z-index:59;"></div>
              <div style="position:absolute; top:60px; right:18px; z-index:60; {{ dropdownPanelStyleRaw }}">
                {{ dropdownContent }}
              </div>
            </sc-if>
            <div style="{{ rightPlayerWrapStyle }}">
              {{ playerCard }}
            </div>
            <div style="flex:1;"></div>
            <button onClick="{{ toggleRightCollapsed }}" style="{{ rightCollapseBtnStyle }}" style-hover="{{ collapseBtnHoverStyle }}">
              {{ rightCollapseIconEl }}
              <sc-if value="{{ playerExpanded }}" hint-placeholder-val="{{ true }}">
                <span>Collapse</span>
              </sc-if>
            </button>
          </div>
        </sc-if>

        <!-- ============ TABLET / MOBILE LAYOUT ============ -->
        <sc-if value="{{ isNotDesktop }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex; flex-direction:column; width:100%; height:100%; position:relative;">
            <div style="height:60px; min-height:60px; border-bottom:1px solid #1E1E1E; background:#0B0B0B; display:flex; align-items:center; justify-content:space-between; padding:0 16px; position:relative; z-index:20;">
              <button onClick="{{ toggleMobileNav }}" style="{{ iconBtnStyle }}" style-hover="{{ iconBtnHoverStyle }}">{{ menuIconEl }}</button>
              <span style="position:absolute; left:50%; transform:translateX(-50%); font-family:'Space Mono',monospace; font-size:13px; letter-spacing:0.06em; color:#FFFFFF;">COLLECTIVE FINITY</span>
              <button onClick="{{ toggleDropdown }}" style="{{ iconBtnStyle }}" style-hover="{{ iconBtnHoverStyle }}">{{ userIconEl }}</button>
            </div>

            <sc-if value="{{ dropdownOpen }}" hint-placeholder-val="{{ false }}">
              <div onClick="{{ closeDropdown }}" style="position:absolute; inset:0; z-index:59;"></div>
              <div style="position:absolute; top:66px; right:14px; z-index:60; {{ dropdownPanelStyleRaw }}">
                {{ dropdownContent }}
              </div>
            </sc-if>

            <sc-if value="{{ mobileNavOpen }}" hint-placeholder-val="{{ false }}">
              <div onClick="{{ toggleMobileNav }}" style="position:absolute; inset:0; background:rgba(0,0,0,0.6); z-index:39; animation:cfOverlayIn 0.18s ease;"></div>
              <div style="position:absolute; top:0; left:0; bottom:0; width:250px; background:#0B0B0B; border-right:1px solid #1E1E1E; z-index:40; padding:18px 14px; display:flex; flex-direction:column; animation:cfDrawerIn 0.22s ease;">
                <div style="display:flex; align-items:center; justify-content:space-between; padding:4px 6px 18px;">
                  <span style="font-family:'Space Mono',monospace; font-size:13px; letter-spacing:0.06em; color:#FFFFFF;">MENU</span>
                  <button onClick="{{ toggleMobileNav }}" style="{{ iconBtnStyle }}" style-hover="{{ iconBtnHoverStyle }}">{{ closeIconEl }}</button>
                </div>
                <div style="display:flex; flex-direction:column; gap:3px;">
                  <sc-for list="{{ mainNav }}" as="item" hint-placeholder-count="5">
                    <button onClick="{{ item.onClick }}" style="{{ item.rowStyleExpanded }}" style-hover="{{ item.rowHoverStyle }}" style-active="{{ item.rowActiveStyle }}">
                      {{ item.iconEl }}<span>{{ item.label }}</span>
                    </button>
                  </sc-for>
                </div>
                <div style="height:1px; background:#1E1E1E; margin:12px 4px;"></div>
                <div style="display:flex; flex-direction:column; gap:3px;">
                  <sc-for list="{{ secondaryNav }}" as="item" hint-placeholder-count="2">
                    <button onClick="{{ item.onClick }}" style="{{ item.rowStyleExpanded }}" style-hover="{{ item.rowHoverStyle }}" style-active="{{ item.rowActiveStyle }}">
                      {{ item.iconEl }}<span>{{ item.label }}</span>
                    </button>
                  </sc-for>
                </div>
              </div>
            </sc-if>

            <div ref="{{ mainScrollRef }}" onScroll="{{ onMainScroll }}" style="flex:1; overflow-y:auto; background:#0D0D0D; padding:{{ contentPadding }}; min-height:0;">
              {{ screenContent }}
              {{ siteFooter }}
            </div>

            <div style="{{ footerPlayerStyle }}">
              {{ footerPlayerContent }}
            </div>
          </div>
        </sc-if>

      </div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.trackTitles = ['Wire & Rust','Afterglow Station','Slow Static','Loose Gravity','Midnight Ledger','Paper Tide','Low Orbit','Paper Moons','Bloomfield','The Long Fade','Grey Hour','Halflight','Vacant Signal','Salt Amber','Delay Line','Undertow','Nine Rooms','Faint Radio','Split Second','Coastline Static'];
    this.durations = ['2:48','3:12','3:24','2:59','4:05','3:37','2:21','3:50','4:18','3:03'];
    this.artists = ['Nova Wraith','Kilo Static','Glass Horizon','Ember Choir','Vantage Low','Iron Season','Half Light Radio','Paper Satellites','Quiet Machine','Northline','Faded Circuits','The Long Signal'];
    this.albumTitles = ['Night Circuits','Amber Frequency','Second Skyline','Static Bloom','Interior Weather','Vacant Signal Redux','Cold Amber EP','Nine Hours','Tape Delay','Glass Radio Sessions'];
    this.albums = this.buildAlbums();
    this.libraryTracks = this.buildLibraryTracks();
    this._ro = null;
    this.state = {
      screen: 'home',
      auth: 'out',
      bpOverride: 'auto',
      measuredWidth: 1440,
      sidebarCollapsed: false,
      mobileNavOpen: false,
      dropdownOpen: false,
      playerCollapsed: false,
      selectedAlbumId: this.albums[0].id,
      likedAlbumIds: {},
      profileTab: 'overview',
      notifPrefs: { emailUpdates: true, newReleases: true, community: false },
      contactSent: false,
      openFaqIndex: 0,
      selectedCategory: 'All',
      selectedPostId: 'p1',
      blogTocOpen: false,
      readProgress: 0,
      openPostFaqIndex: null,
      shareMenuOpen: false,
      postLiked: false,
      postLikeCount: 24,
      draftRating: 0,
      draftReviewText: '',
      extraReviews: [],
      player: { title: 'Select a track', artist: '—', playing: false, progress: 0.0, volume: 0.7, liked: false, shuffle: false, repeat: false, albumId: null, trackIndex: 0 },
    };
  }

  componentDidMount() {
    window.addEventListener('resize', this.measureFrame);
    this._measureInterval = setInterval(this.measureFrame, 350);
  }
  componentWillUnmount() {
    if (this._ro) this._ro.disconnect();
    window.removeEventListener('resize', this.measureFrame);
    if (this._measureInterval) clearInterval(this._measureInterval);
  }

  measureFrame = () => {
    if (!this._frameEl) return;
    const w = Math.round(this._frameEl.getBoundingClientRect().width);
    if (w && w !== this.state.measuredWidth) this.setState({ measuredWidth: w });
  };

  setFrameRef = (el) => {
    this._frameEl = el;
    if (el) {
      if (window.ResizeObserver) {
        if (this._ro) this._ro.disconnect();
        this._ro = new ResizeObserver(() => this.measureFrame());
        this._ro.observe(el);
      }
      this.measureFrame();
    }
  };

  gradientFor(seed) {
    const angle = 110 + (seed * 41) % 180;
    const px = 15 + (seed * 31) % 65;
    const py = 10 + (seed * 53) % 70;
    const light1 = (0.30 + ((seed * 13) % 18) / 100).toFixed(2);
    const chroma1 = (0.10 + ((seed * 7) % 5) / 100).toFixed(2);
    return `radial-gradient(circle at ${px}% ${py}%, oklch(${light1} ${chroma1} 85) 0%, oklch(0.15 0.025 60) 45%, oklch(0.06 0.01 40) 100%)`;
  }

  buildAlbums() {
    const alb = [];
    for (let i = 0; i < 10; i++) {
      const title = this.albumTitles[i % this.albumTitles.length];
      const artist = this.artists[(i * 3 + 1) % this.artists.length];
      const year = 2019 + (i % 7);
      const trackCount = 5 + (i % 4);
      const tracks = [];
      for (let t = 0; t < trackCount; t++) {
        tracks.push({
          id: 'a' + i + '-t' + t,
          title: this.trackTitles[(i * 5 + t) % this.trackTitles.length],
          duration: this.durations[(i + t) % this.durations.length],
        });
      }
      alb.push({ id: 'a' + i, title, artist, year, trackCount, seed: i, tracks, gradient: this.gradientFor(i) });
    }
    return alb;
  }

  buildLibraryTracks() {
    const out = [];
    this.albums.slice(0, 7).forEach((a) => {
      a.tracks.slice(0, 2).forEach((t) => out.push({ ...t, artist: a.artist, album: a.title, albumId: a.id }));
    });
    return out;
  }

  icon(name, size = 18, filled = false) {
    const s = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.8, strokeLinecap: 'round', strokeLinejoin: 'round' };
    const map = {
      home: [['path', { d: 'M4 11.5 12 4l8 7.5' }], ['path', { d: 'M6 10v9a1 1 0 0 0 1 1h4v-6h2v6h4a1 1 0 0 0 1-1v-9' }]],
      library: [['rect', { x: 4, y: 4, width: 6, height: 16, rx: 1 }], ['rect', { x: 14, y: 4, width: 6, height: 16, rx: 1 }]],
      albums: [['circle', { cx: 12, cy: 12, r: 8 }], ['circle', { cx: 12, cy: 12, r: 2 }]],
      about: [['circle', { cx: 12, cy: 12, r: 8.5 }], ['line', { x1: 12, y1: 11, x2: 12, y2: 16 }], ['circle', { cx: 12, cy: 7.5, r: 0.6, fill: 'currentColor' }]],
      community: [['circle', { cx: 9, cy: 9, r: 3 }], ['path', { d: 'M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5' }], ['circle', { cx: 17, cy: 9, r: 2.4 }], ['path', { d: 'M15.5 14.2c2.4.3 4.2 2.1 4.2 4.8' }]],
      heart: [['path', { d: 'M12 20s-7-4.35-9.5-8.8C.8 8 2 4.5 5.5 4.5c2 0 3.3 1.2 6.5 3.9C15.2 5.7 16.5 4.5 18.5 4.5 22 4.5 23.2 8 21.5 11.2 19 15.65 12 20 12 20z', fill: filled ? 'currentColor' : 'none' }]],
      playlist: [['line', { x1: 4, y1: 6, x2: 16, y2: 6 }], ['line', { x1: 4, y1: 12, x2: 16, y2: 12 }], ['line', { x1: 4, y1: 18, x2: 11, y2: 18 }], ['circle', { cx: 19, cy: 15, r: 2.4 }], ['line', { x1: 21.4, y1: 15, x2: 21.4, y2: 8 }]],
      user: [['circle', { cx: 12, cy: 8, r: 3.4 }], ['path', { d: 'M4.5 20c1-4 4-6 7.5-6s6.5 2 7.5 6' }]],
      bell: [['path', { d: 'M6 16v-4.5A6 6 0 0 1 12 5.5v0a6 6 0 0 1 6 6V16l1.6 2.2H4.4z' }], ['path', { d: 'M9.5 19.5a2.5 2.5 0 0 0 5 0' }]],
      mail: [['rect', { x: 3, y: 5.5, width: 18, height: 13, rx: 1.5 }], ['path', { d: 'M3.5 6.5 12 13l8.5-6.5' }]],
      menu: [['line', { x1: 4, y1: 7, x2: 20, y2: 7 }], ['line', { x1: 4, y1: 12, x2: 20, y2: 12 }], ['line', { x1: 4, y1: 17, x2: 20, y2: 17 }]],
      close: [['line', { x1: 6, y1: 6, x2: 18, y2: 18 }], ['line', { x1: 18, y1: 6, x2: 6, y2: 18 }]],
      chevronLeft: [['polyline', { points: '15 6 9 12 15 18' }]],
      play: [['path', { d: 'M7 5.5v13l11-6.5z', fill: 'currentColor', stroke: 'none' }]],
      pause: [['rect', { x: 6.5, y: 5, width: 4, height: 14, fill: 'currentColor', stroke: 'none' }], ['rect', { x: 13.5, y: 5, width: 4, height: 14, fill: 'currentColor', stroke: 'none' }]],
      skipBack: [['polygon', { points: '18 5 8 12 18 19', fill: 'currentColor', stroke: 'none' }], ['line', { x1: 6, y1: 5, x2: 6, y2: 19, strokeWidth: 2.4 }]],
      skipFwd: [['polygon', { points: '6 5 16 12 6 19', fill: 'currentColor', stroke: 'none' }], ['line', { x1: 18, y1: 5, x2: 18, y2: 19, strokeWidth: 2.4 }]],
      shuffle: [['polyline', { points: '16 3 21 3 21 8' }], ['line', { x1: 4, y1: 20, x2: 21, y2: 3 }], ['polyline', { points: '21 16 21 21 16 21' }], ['line', { x1: 15, y1: 15, x2: 21, y2: 21 }], ['line', { x1: 4, y1: 4, x2: 9, y2: 9 }]],
      repeat: [['polyline', { points: '17 2 21 6 17 10' }], ['path', { d: 'M3 11V9a4 4 0 0 1 4-4h14' }], ['polyline', { points: '7 22 3 18 7 14' }], ['path', { d: 'M21 13v2a4 4 0 0 1-4 4H3' }]],
      volume: [['path', { d: 'M4 9v6h4l5 4V5L8 9z' }], ['path', { d: 'M17 8.5a5 5 0 0 1 0 7' }], ['path', { d: 'M19.5 6a8.5 8.5 0 0 1 0 12' }]],
      search: [['circle', { cx: 10.5, cy: 10.5, r: 6.5 }], ['line', { x1: 15.5, y1: 15.5, x2: 21, y2: 21 }]],
      share: [['circle', { cx: 18, cy: 5, r: 2.2 }], ['circle', { cx: 6, cy: 12, r: 2.2 }], ['circle', { cx: 18, cy: 19, r: 2.2 }], ['line', { x1: 8.2, y1: 10.8, x2: 15.8, y2: 6.2 }], ['line', { x1: 8.2, y1: 13.2, x2: 15.8, y2: 17.8 }]],
      lock: [['rect', { x: 5.5, y: 10.5, width: 13, height: 9, rx: 1.5 }], ['path', { d: 'M8 10.5V8a4 4 0 0 1 8 0v2.5' }]],
      plus: [['line', { x1: 12, y1: 5, x2: 12, y2: 19 }], ['line', { x1: 5, y1: 12, x2: 19, y2: 12 }]],
      pin: [['path', { d: 'M12 21s-7-6.2-7-11.5A7 7 0 0 1 19 9.5C19 14.8 12 21 12 21z' }], ['circle', { cx: 12, cy: 9.5, r: 2.4 }]],
      link: [['path', { d: 'M9 15 15 9' }], ['path', { d: 'M11 6.5 12.5 5A3.8 3.8 0 0 1 18 10.5L16.5 12' }], ['path', { d: 'M13 17.5 11.5 19A3.8 3.8 0 0 1 6 13.5L7.5 12' }]],
      star: [['path', { d: 'M12 3.5 14.5 9l6 .6-4.5 4 1.3 5.9-5.3-3.1-5.3 3.1 1.3-5.9-4.5-4 6-.6z', fill: filled ? 'currentColor' : 'none' }]],
      blog: [['rect', { x: 4, y: 4, width: 16, height: 16, rx: 2 }], ['line', { x1: 7.5, y1: 9, x2: 16.5, y2: 9 }], ['line', { x1: 7.5, y1: 12.5, x2: 16.5, y2: 12.5 }], ['line', { x1: 7.5, y1: 16, x2: 13, y2: 16 }]],
      chevronDown: [['polyline', { points: '6 9 12 15 18 9' }]],
      chat: [['path', { d: 'M4 6h16a2 2 0 0 1 2 2v6.5a2 2 0 0 1-2 2H10l-4.5 3.5V16.5H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z' }]],
      video: [['rect', { x: 3, y: 6.5, width: 13, height: 11, rx: 2 }], ['path', { d: 'M16.5 10.2 21 7v10l-4.5-3.2z' }]],
      camera: [['rect', { x: 3, y: 7.5, width: 18, height: 12.5, rx: 2 }], ['path', { d: 'M8.5 7.5 10 5h4l1.5 2.5' }], ['circle', { cx: 12, cy: 13.8, r: 3.6 }]],
      cart: [['circle', { cx: 9.5, cy: 20, r: 1.3, fill: 'currentColor', stroke: 'none' }], ['circle', { cx: 18, cy: 20, r: 1.3, fill: 'currentColor', stroke: 'none' }], ['path', { d: 'M3 4h2.2l2.3 12h11.3l1.7-8H6.1' }]],
      waveform: [['line', { x1: 4, y1: 10, x2: 4, y2: 14 }], ['line', { x1: 8, y1: 6, x2: 8, y2: 18 }], ['line', { x1: 12, y1: 3, x2: 12, y2: 21 }], ['line', { x1: 16, y1: 7, x2: 16, y2: 17 }], ['line', { x1: 20, y1: 9.5, x2: 20, y2: 14.5 }]],
      musicNote: [['circle', { cx: 7, cy: 18, r: 2.6 }], ['circle', { cx: 17, cy: 16, r: 2.6 }], ['line', { x1: 9.5, y1: 18, x2: 9.5, y2: 4.5 }], ['line', { x1: 19.5, y1: 16, x2: 19.5, y2: 2.5 }], ['path', { d: 'M9.5 4.5 19.5 2.5' }]],
    };
    const children = (map[name] || []).map((el, idx) => React.createElement(el[0], { key: idx, ...el[1] }));
    return React.createElement('svg', s, ...children);
  }

      h2('sec-2', 'How AI Is Changing Music Creation'),

      h2('sec-3', 'How AI Music Production Works (The Tech Made Simple)'),
      p('Most tools follow the same basic shape: a model trained on large amounts of audio learns the statistical relationships between sounds, then generates new audio conditioned on a prompt, a melody, or a reference track. The output is raw material \u2014 it still needs a producer\u2019s ear to arrange, mix, and finish.'),
