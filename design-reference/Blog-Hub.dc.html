<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</helmet>
<dc-import name="Shell" active-screen="blog" content="{{ pageContent }}" hint-size="100%,100%"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = { loaded: false, width: typeof window !== 'undefined' ? window.innerWidth : 1440 };
  }
  async componentDidMount() {
    const [dataMod, uiMod] = await Promise.all([import('./shared-data.js'), import('./shared-ui.js')]);
    this._mod = dataMod;
    this._ui = uiMod;
    this.setState({ loaded: true });
    this._onResize = () => this.setState({ width: window.innerWidth });
    window.addEventListener('resize', this._onResize);
  }
  componentWillUnmount() { if (this._onResize) window.removeEventListener('resize', this._onResize); }

  renderVals() {
    if (!this.state.loaded) return { pageContent: null };
    const isMobile = this.state.width < 768;
    const { blogCategories, blogPosts, gradientFor } = this._mod;

    const categoryChip = (cat) => React.createElement('a', { key: cat, href: cat === 'All' ? 'Blog-Hub.dc.html' : 'Category-Archive.dc.html?cat=' + encodeURIComponent(cat), style: { padding: '8px 14px', borderRadius: '999px', border: cat === 'All' ? '1px solid #FFB700' : '1px solid #262626', background: cat === 'All' ? 'rgba(255,183,0,0.14)' : 'transparent', color: cat === 'All' ? '#FFB700' : '#B3B3B3', fontSize: '12.5px', fontWeight: cat === 'All' ? 700 : 500, textDecoration: 'none', whiteSpace: 'nowrap', display: 'inline-block' }, 'style-hover': { color: '#fff' } }, cat);

    const postCard = (post) => React.createElement('a', { key: post.id, href: 'Blog-Post.dc.html?id=' + post.id, style: { display: 'flex', flexDirection: 'column', textDecoration: 'none', border: '1px solid #232323', background: '#141414', borderRadius: '12px', overflow: 'hidden', color: '#fff' }, 'style-hover': { border: '1px solid #2c2c2c' } },
      React.createElement('div', { style: { width: '100%', aspectRatio: '16/9', background: gradientFor(post.seed) } }),
      React.createElement('div', { style: { padding: '16px', display: 'flex', flexDirection: 'column', gap: '8px' } },
        React.createElement('span', { style: { fontFamily: "'Space Mono',monospace", fontSize: '10.5px', color: '#FFB700' } }, post.category.toUpperCase()),
        React.createElement('div', { style: { fontSize: '15px', fontWeight: 700, lineHeight: 1.35 } }, post.title),
        React.createElement('div', { style: { fontSize: '12.5px', color: '#7A7A7A', lineHeight: 1.5 } }, post.excerpt),
        React.createElement('div', { style: { fontSize: '11.5px', color: '#4a4a4a', fontFamily: "'Space Mono',monospace", marginTop: '2px' } }, post.date + ' \u00B7 ' + post.readTime)));

    const featuredPost = blogPosts[0];
    const featuredPostCard = React.createElement('a', { href: 'Blog-Post.dc.html?id=' + featuredPost.id, style: { display: 'flex', flexDirection: isMobile ? 'column' : 'row', textDecoration: 'none', border: '1px solid #232323', background: '#141414', borderRadius: '14px', overflow: 'hidden', color: '#fff', width: '100%' }, 'style-hover': { border: '1px solid #2c2c2c' } },
      React.createElement('div', { style: { width: isMobile ? '100%' : '46%', aspectRatio: isMobile ? '16/9' : 'auto', minHeight: isMobile ? undefined : '220px', background: gradientFor(featuredPost.seed), flexShrink: 0 } }),
      React.createElement('div', { style: { padding: isMobile ? '20px' : '28px', display: 'flex', flexDirection: 'column', gap: '10px', justifyContent: 'center' } },
        React.createElement('span', { style: { fontFamily: "'Space Mono',monospace", fontSize: '11px', color: '#FFB700' } }, featuredPost.category.toUpperCase() + ' \u00B7 FEATURED'),
        React.createElement('div', { style: { fontSize: isMobile ? '19px' : '24px', fontWeight: 700, lineHeight: 1.3 } }, featuredPost.title),
        React.createElement('div', { style: { fontSize: '13.5px', color: '#B3B3B3', lineHeight: 1.6 } }, featuredPost.excerpt),
        React.createElement('div', { style: { fontSize: '12px', color: '#7A7A7A', fontFamily: "'Space Mono',monospace" } }, featuredPost.date + ' \u00B7 ' + featuredPost.readTime)));

    const pageContent = React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: '26px' } },
      React.createElement('div', { style: { fontSize: isMobile ? '22px' : '26px', fontWeight: 700, color: '#fff' } }, 'Blog'),
      featuredPostCard,
      React.createElement('div', { style: { display: 'flex', gap: '8px', overflowX: 'auto', paddingBottom: '4px' } }, blogCategories.map((cat) => categoryChip(cat))),
      React.createElement('div', { style: { display: 'grid', gridTemplateColumns: `repeat(auto-fill, minmax(${isMobile ? '100%' : '260px'}, 1fr))`, gap: '18px' } }, blogPosts.map((p) => postCard(p))));

    return { pageContent };
  }
}

</script>
</body>
</html>
